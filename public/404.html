<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathAI | 404 Page Not Found</title>
    <meta name="description" content="404 page for invalid routes in PathAI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/notfound.css">
</head>
<body class="notfound-body">
    <div class="bg-orb orb-one" aria-hidden="true"></div>
    <div class="bg-orb orb-two" aria-hidden="true"></div>
    <div class="grid-noise" aria-hidden="true"></div>

    <main class="notfound-shell" role="main" aria-labelledby="notfoundTitle">
        <a class="brand" href="/" aria-label="PathAI home">path<span>AI</span></a>

        <section class="notfound-card">
            <p class="status-pill">ROUTE ERROR</p>
            <h1 id="notfoundTitle">404 - Page Not Found</h1>
            <p class="notfound-copy">The page you are looking for does not exist.</p>
            <p class="notfound-copy muted">It may have been moved, deleted, or the URL may be incorrect.</p>

            <div class="actions">
                <a class="btn-main" href="/">Back to Home</a>
            </div>
        </section>
    </main>

    <script>
        const backButton = document.getElementById("goBackBtn");
        backButton.addEventListener("click", () => {
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.assign("/");
        });
    </script>
</body>
</html>
